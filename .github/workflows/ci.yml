name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Auth service tests
        working-directory: auth-service
        run: mvn -B test

      - name: Tasks service tests
        working-directory: tasks-service
        run: mvn -B test

      - name: Analytics service tests
        working-directory: analytics-service
        run: mvn -B test

  e2e:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start services (Docker Compose)
        run: docker compose up -d --build

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev -- --host 0.0.0.0 --port 3000 >/tmp/frontend.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3000 >/dev/null && exit 0
            sleep 2
          done
          echo "Frontend did not start"; cat /tmp/frontend.log; exit 1

      - name: Run e2e tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_AUTH_API: http://localhost:8081/api/auth
          E2E_TASKS_API: http://localhost:8082/api
        run: npm run test:e2e

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: /tmp/frontend.log

