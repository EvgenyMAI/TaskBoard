spring:
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

app:
  jwt:
    secret: taskboard-auth-secret-key-min-256-bits-for-hs256
    expiration-ms: 86400000

logging:
  level:
    root: WARN
